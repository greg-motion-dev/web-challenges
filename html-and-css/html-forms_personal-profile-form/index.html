<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <title>Personal Profile Form</title>
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <div>
      <h1>Create Your Personal Profile</h1>
    <fieldset>

      <form action="submit">
        <fieldset>
          <p>
            We want to get to know you! Please enter your personal information.
          </p>
          <legend>Personal Information</legend>
            <label for="firstName">First Name:</label>
            <input type="text" id="firstName">

            <label for="lastName">Last Name:</label>
            <input type="text" id="lastName">

            <label for="date">Your Birthday:</label>
            <input type="date" id="date">

        </fieldset>

        <p>Can you tell us a little bit more?
        We want to annoy you with unwanted ads.
        </p>

        <fieldset>
          <legend>Further Information</legend>
            <label for="colorPick">Favourite Color:</label>
            <input type="color" id="colorPick" value="#ff6347">
            
            <label>What is your favorite pet?</label>
            <select>
              <option value="0">--Please choose an option--</option>
              <option value="1">Poodle</option>
              <option value="2">Peacock</option>
              <option value="3">Piranha/option>
            </select>
         </fieldset>
         <button type="submit">Submit</button>
      </form>

    </fieldset>
  </div>
  </body>
</html>
